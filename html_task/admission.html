<!DOCTYPE html>
<html>
    <head>
        <title>Admission</title>
    </head>
<body>
     <h2>Admission Form</h2>
    <form>
        <fieldset>
            <legend>Personal Information</legend>
    
        <label>Name:</label>
        <input type="text" maxlength="30" ><br>

        <label>Email:</label>
        <input type="email" required><br>
        <label>Date of Birth:</label>
        <input type="date"><br>
        <label>Gender:</label>
        <input type="radio" name="gender" > Male
        <input type="radio" name="gender" > Female <br>

       <label>Interest:</label><br>
        <input type="checkbox" > Innovation
        <input type="checkbox" > Reading
        <input type="checkbox" > Travel
        <input type="checkbox" > Sports <br>
</fieldset>
        <fieldset>
            <legend>Academic Information</legend>
            <label>Choose Department:</label>
            <select >
                <option >BBA</option>
                <option >EEE</option>
                <option>CSE</option>
                <option >Law</option>
            </select><br>
            <label>Upload HSC Transcript:</label>
            <input type="file" accept="application/pdf"><br>


        </fieldset>

        <input type="submit" >
        <input type="reset" >
        
        </form>

    </body>
    </html>
